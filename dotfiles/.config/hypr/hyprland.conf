$mainMod = SUPER

exec-once = hypridle

###############
# keybindings #
###############

# terminal
bind = $mainMod, Return, exec, ghostty

# kill focused window
bind = $mainMod, Q, killactive

# launcher
bind = $mainMod, D, exec, fuzzel

# emoji picker
bind = $mainMod, period, exec, emote

# power menu
bind = $mainMod SHIFT, E, exec, ~/.config/i3/scripts/powermenu

# reload / restart
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, R, exec, hyprctl dispatch exit

# focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# move window
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# switch workspace
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move container to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# fullscreen
bind = $mainMod, F, fullscreen, 0

# floating
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod, Space, focusurgentorlast

# layout
bind = $mainMod, V, togglesplit
bind = $mainMod, W, swapsplit
bind = $mainMod, E, togglesplit
bind = $mainMod, G, togglegroup

# move workspace to monitor
bind = $mainMod CTRL SHIFT, H, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, J, movecurrentworkspacetomonitor, d
bind = $mainMod CTRL SHIFT, K, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL SHIFT, L, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL SHIFT, left,  movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, down,  movecurrentworkspacetomonitor, d
bind = $mainMod CTRL SHIFT, up,    movecurrentworkspacetomonitor, u
bind = $mainMod CTRL SHIFT, right, movecurrentworkspacetomonitor, r

# waybar toggle
bind = $mainMod, B,       exec, waybar
bind = $mainMod SHIFT, B, exec, killall waybar

# audio port switch
bind = $mainMod, P, exec, /usr/local/bin/switch-audio-port

# screenshots
bind = $mainMod SHIFT, P, exec, bash -c '$HOME/.scripts/screencap.sh && notify-send "Screenshot saved to ~/.screenshots/"'
bind = $mainMod ALT,   P, exec, bash -c '$HOME/.scripts/screencap.sh clip && notify-send "Screenshot saved to clipboard"'

# brightness
bind = , XF86MonBrightnessDown, exec, light -U 10
bind = , XF86MonBrightnessUp,   exec, light -A 10

# volume
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# media
bind = , XF86AudioPlay,  exec, playerctl play
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous

# resize submap (equivalent of sway resize mode)
bind = $mainMod, R, submap, resize
submap = resize
binde = , H, resizeactive, -20 0
binde = , L, resizeactive, 20 0
binde = , K, resizeactive, 0 -20
binde = , J, resizeactive, 0 20
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset
